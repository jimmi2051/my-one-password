services:
  backend:
    build:
      context: ./backend
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    environment:
      # Override .env values that differ inside Docker
      DB_PATH: /app/data/vault.db
      FRONTEND_URL: https://jimmi2051-ideapad-l340-15irh-gaming.tailcd88c1.ts.net
      PYTHON_KEYRING_BACKEND: keyring.backends.null.Keyring
    volumes:
      - vault-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

